<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deepfake Detection UI</title>

    <link rel="stylesheet" href="styles/general.css">
    <link rel="stylesheet" href="styles/background.css">
    <link rel="stylesheet" href="styles/card.css">
    <link rel="stylesheet" href="styles/tabs.css">
    <link rel="stylesheet" href="styles/textarea.css">
    <link rel="stylesheet" href="styles/display.css">
    <link rel="stylesheet" href="styles/header.css">
    <link rel="stylesheet" href="styles/footer.css">
    <link rel="stylesheet" href="styles/status.css">
</head>

<body>

    <!-- HEADER -->
    <div class="header">
        <div class="logo">Nitya<span>Anitya</span></div>
        <div class="badge">AI-POWERED DETECTION</div>
    </div>

    <!-- MAIN -->
    <div class="container">

        <div class="status">SYSTEM ACTIVE</div>

        <h1>Deepfake Detection Platform</h1>

        <p class="subtitle">
            Advanced AI-powered verification system for content authenticity<br>
            Deploy neural analysis protocols to detect AI-generated content
        </p>

        <!-- CARD -->
        <div class="card">

            <div class="card-header">
                <div>&gt; CONTENT ANALYSIS INPUT</div>
                <div class="ready">● READY</div>
            </div>

            <div class="tabs">
                <button class="tabactive">TEXT ANALYSIS</button>
                <button class="tab">PHOTO ANALYSIS</button>
            </div>

            <textarea placeholder="Paste text content for deepfake analysis..."></textarea>

            <div class="card-footer">
                <span>0 CHARS</span>
                <button class="scan-btn">INITIATE SCAN</button>
            </div>

        </div>

    </div>

</body>

</html>
